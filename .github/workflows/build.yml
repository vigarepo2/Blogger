name: Build Template
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Compile XML
        run: python build.py

      - name: Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Final-Blogger-Theme
          path: dist/theme.xml
          retention-days: 7
