name: Generate Premium Theme (Manual)

on:
  workflow_dispatch: # Only allows manual trigger from the UI

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Checkout Code
        uses: actions/checkout@v4

      - name: 2. Set Up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Run Heavy Build Engine
        run: python build.py

      - name: 4. Upload Production XML
        uses: actions/upload-artifact@v4
        with:
          name: Premium-Blogger-Theme
          path: dist/theme.xml
          retention-days: 5 # Keeps the download link active for 5 days
